name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
            artifact: dist-mac
          - os: windows-latest
            script: build:win
            artifact: dist-win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      # package.json 里的 repository 字段会让 electron-builder 在 CI(CI=true)下自动推断
      # GitHub publish 目标并尝试联网发布，没传 --publish 也一样，缺 GH_TOKEN 就直接报错退出。
      # 这里显式关掉自动发布：只在本 job 里产出本地安装包，真正发布交给下面单独的 publish job，
      # 避免两个 matrix job 各自抢着建 release 造成竞态。
      - run: npm run ${{ matrix.script }} -- --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest*.yml
          if-no-files-found: error

  # 两个平台各自只上传构建产物为 artifact，不在 matrix 里直接 --publish：
  # 并行的两个 job 同时 publish 会各自建一个 draft release（找不到彼此刚建的那个），
  # 导致同一个 tag 拆成两个不完整的 draft。改为等两边都构建完，
  # 由这个单独 job 统一创建一个 release 并把所有产物传上去。
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          name: Simple Music ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          files: release-assets/**
